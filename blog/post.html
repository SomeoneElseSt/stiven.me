<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>%%POST_TITLE%%</title>
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light-mode');</script>
    <link rel="stylesheet" href="/theme.css">
    <style>
        :root { --code-bg: #000; --code-border: #333; --code-track: #111; --code-thumb: #444; --copy-bg: #000; --copy-border: #333; --copy-fg: #555; --copy-active: #111; --bq-border: rgba(255,255,255,0.65); }
        :root.light-mode { --code-bg: #fff; --code-border: #ccc; --code-track: #eee; --code-thumb: #bbb; --copy-bg: #fff; --copy-border: #ccc; --copy-fg: #999; --copy-active: #eee; --bq-border: rgba(0,0,0,0.35); }
        body { background: var(--bg); color: var(--fg); font-family: Inter, 'Inter Fallback', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; margin: 0; padding: 100px; }
        h1 { font-size: 24px; margin-bottom: 24px; }
        .blog-header { padding-top: 5px; }
        .blog-post-item { border-bottom: 1px solid var(--border); padding: 16px 0; }
        .blog-post-link { text-decoration: none; display: flex; justify-content: space-between; align-items: center; }
        .blog-post-title { display: block; font-weight: normal; font-size: 16px; line-height: 1.6; color: var(--fg); }
        .blog-post-date { font-size: 14px; opacity: 0.6; margin-left: 16px; color: var(--fg); }
        .social-links { margin-top: 16px; display: flex; gap: 24px; min-height: 20px; align-items: center; }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; max-width: 600px;} /* Modify margin-bottom to move text up/down */
        .post-header > div { flex: 1; }
        .post-header h1 { margin: 0; margin-bottom: 15px; font-size: 24px; font-weight: bold; line-height: 1.4; position: relative; top: 12px; } 
        #post-date.post-date { display: block; margin-bottom: 0; font-size: 14px; opacity: 0.7; margin-top: 22px; } /* Change margin top to modify post header height */
        .back-button { display: inline-block; font-size: 16px; text-decoration: none; white-space: nowrap; margin-left: 16px; color: var(--fg); line-height: 1.2; position: relative; top: 16px; } /* Change top to move back button up/down */
        article { max-width: 600px; overflow: hidden; }
        article a { color: var(--fg); text-decoration: underline; text-underline-offset: 4px; }
        article p { margin: 16px 0; }
        article blockquote { margin: 24px 0; padding: 4px 0 4px 16px; border-left: 2px solid var(--bq-border); }
        article blockquote p { margin: 8px 0; }
        article h2 { font-size: 24px; margin-top: 32px; margin-bottom: 16px; }
        article h3 { font-size: 20px; margin-top: 24px; margin-bottom: 12px; }
        article img { max-width: 100%; height: auto; margin: 24px 0; }
        article details { margin: 0px 0; }
        article summary { cursor: pointer; }
        .code-wrapper { position: relative; }
        .code-wrapper pre { margin: 2px 0 0; overflow-x: auto; border: 1px solid var(--code-border); border-radius: 4px; padding: 12px; padding-top: 36px; box-sizing: border-box; }
        .code-wrapper pre::-webkit-scrollbar { height: 6px; }
        .code-wrapper pre::-webkit-scrollbar-track { background: var(--code-track); }
        .code-wrapper pre::-webkit-scrollbar-thumb { background: var(--code-thumb); border-radius: 3px; }
        .copy-btn { position: absolute; top: 6px; right: 5px; background: var(--copy-bg); border: 1px solid var(--copy-border); border-radius: 4px; color: var(--copy-fg); cursor: pointer; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; padding: 0; z-index: 1; line-height: 0; }
        .copy-check { opacity: 0; transition: opacity 320ms ease; } /* Opacity ms controls checkmark ease-in and out speed in copy -> copied icon  */
        .copy-btn:active { background: var(--copy-active); }
        .copy-btn svg { width: 14px; height: 14px; }
        @media (max-width: 768px) {
            .code-wrapper pre { scrollbar-width: none; padding-bottom: 12px; }
            .code-wrapper pre::-webkit-scrollbar { height: 0; }
            .code-scrollbar { position: absolute; bottom: 4px; left: 4px; right: 1px; height: 3px; background: var(--code-track); overflow: hidden; }
            .code-scrollbar-thumb { position: absolute; top: 0; height: 100%; background: var(--code-thumb); }
        }
        .footnotes { font-size: 0.83em; margin-top: 32px; }
        .footnotes h2 { display: none; }
        .footnotes ol { padding-left: 1.5em; }
        .footnotes li { margin-bottom: 8px; }
        #nprogress .bar { background: var(--fg) !important; height: 2px !important; }
        #nprogress .peg { box-shadow: 0 0 10px var(--fg), 0 0 5px var(--fg); }
        #nprogress .spinner { display: none !important; }
        @media (max-width: 768px) {
            body { padding: 24px; }
            .post-header { margin-top: 20px; } /* Change margin top to modify the padding between the title and empty space above */
            .social-links { margin-bottom: 150px; } /* Change margin bottom to add/reduce whitespace between the links and the footer */
        }
    </style>
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiA.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v20/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuFuYAZ9hiA.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.28/dist/katex.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script type="module" src="/dist/init.js?v=1.2" defer></script>
</head>
<body>
    <div class="post-header">
        <div>
            <h1 id="post-title">%%POST_TITLE%%</h1>
            <time id="post-date" class="post-date">%%POST_DATE%%</time>
        </div>
        <a href="/" class="back-button">← Back</a>
    </div>
    
    <article id="post-content">%%POST_CONTENT%%</article>
    
    <script>
        function isSafari() {
            return typeof safari !== 'undefined';
        }

        function isPhone() {
            const isMobileSize = window.matchMedia("(max-width: 768px)").matches;
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            return isMobileSize && isTouchDevice;
        }

        function shouldDisableNProgress() {
            return isSafari() || isPhone();
        }

        function finishProgress() {
            if (!shouldDisableNProgress() && typeof NProgress !== 'undefined') {
                NProgress.configure({ showSpinner: false, minimum: 0.1, speed: 200, trickleSpeed: 50 });
                NProgress.set(0.7);
                setTimeout(function() {
                    NProgress.done();
                }, 100);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', finishProgress);
        } else {
            finishProgress();
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text);
            } else {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }

        function initCopyButtons() {
            var btnSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><polyline class="copy-check" points="9 13 11 15 15 11"/></svg>';

            document.querySelectorAll('article details').forEach(function(details) {
                details.addEventListener('toggle', function() {
                    if (!details.open || details.querySelector('.code-wrapper')) return;
                    var pre = details.querySelector('pre');
                    if (!pre) return;

                    var wrapper = document.createElement('div');
                    wrapper.className = 'code-wrapper';
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);

                    var btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerHTML = btnSvg;
                    var check = btn.querySelector('.copy-check');
                    var canReset = false;
                    var hovering = false;

                    btn.addEventListener('click', function() {
                        var code = pre.querySelector('code');
                        copyToClipboard((code || pre).textContent);
                        check.style.opacity = '1';
                        canReset = false;
                        setTimeout(function() {
                            if (isPhone()) {
                                check.style.opacity = '0';
                            } else {
                                canReset = true;
                                if (!hovering) {
                                    check.style.opacity = '0';
                                    canReset = false;
                                }
                            }
                        }, 1200); // 1.2 second minimum for checkmark to display
                    });

                    btn.addEventListener('mouseenter', function() { hovering = true; });
                    btn.addEventListener('mouseleave', function() {
                        hovering = false;
                        if (canReset) {
                            check.style.opacity = '0';
                            canReset = false;
                        }
                    });

                    wrapper.appendChild(btn);

                    if (isPhone()) {
                        var track = document.createElement('div');
                        track.className = 'code-scrollbar';
                        var thumb = document.createElement('div');
                        thumb.className = 'code-scrollbar-thumb';
                        track.appendChild(thumb);
                        wrapper.appendChild(track);

                        function updateThumb() {
                            if (pre.scrollWidth <= pre.clientWidth) {
                                track.style.display = 'none';
                                return;
                            }
                            track.style.display = '';
                            var ratio = pre.clientWidth / pre.scrollWidth;
                            var thumbPct = ratio * 100;
                            var maxScroll = pre.scrollWidth - pre.clientWidth;
                            var leftPct = maxScroll > 0 ? (pre.scrollLeft / maxScroll) * (100 - thumbPct) : 0;
                            thumb.style.width = thumbPct + '%';
                            thumb.style.left = leftPct + '%';
                        }

                        updateThumb();
                        pre.addEventListener('scroll', updateThumb);
                    }
                });
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCopyButtons);
        } else {
            initCopyButtons();
        }
    </script>
    <script>
        (function() {
            if (localStorage.getItem('theme') !== 'light') return;
            var imgs = document.querySelectorAll('article img');
            imgs.forEach(function(img) {
                var src = img.getAttribute('src');
                if (src && src.endsWith('.png') && !src.includes('-light.')) {
                    var lightSrc = src.replace('.png', '-light.png');
                    img.setAttribute('src', lightSrc);
                    img.onerror = (function(original) {
                        return function() { img.setAttribute('src', original); img.onerror = null; };
                    })(src);
                }
            });
        })();
    </script>
</body>
</html>
